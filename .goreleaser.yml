version: 2

project_name: s2

builds:
  - main: .
    binary: s2
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/selfbase-dev/s2-sync/cmd.version={{.Version}}
      - -X github.com/selfbase-dev/s2-sync/cmd.commit={{.ShortCommit}}

archives:
  - formats: [tar.gz]
    name_template: "s2sync-cli_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  prerelease: auto
