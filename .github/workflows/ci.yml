name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      # Skip ./gui/... — it is a Wails-managed package whose //go:embed
      # all:frontend/dist only resolves after `wails build` runs the
      # frontend build. The GUI is verified in its own build workflow.
      # CLI, sync core, and desktop service layer all compile/test
      # standalone.
      # Run tests with the `testseam` tag so the auth test helpers
      # (internal/auth/testing.go) compile in. The build step below
      # intentionally OMITS the tag — that's the contract: release
      # binaries must not contain SwapKeyringForTesting et al.
      - run: go test -tags=testseam ./cmd/... ./internal/...
      - run: go build -o /dev/null ./cmd/... ./internal/...
