name: GUI Build

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            runner: macos-latest
            wails_tags: ""
          - name: windows-amd64
            runner: windows-latest
            wails_tags: ""
          - name: linux-amd64
            runner: ubuntu-latest
            wails_tags: "webkit2_41"
    runs-on: ${{ matrix.runner }}
    env:
      WAILS_VERSION: v2.12.0
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gui/frontend/package-lock.json

      - name: Install Linux build deps
        if: matrix.name == 'linux-amd64'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Put Go bin on PATH
        shell: bash
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run service tests
        shell: bash
        run: go test ./internal/service/...

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Build GUI
        working-directory: gui
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ matrix.wails_tags }}" ]; then
            wails build -clean -tags "${{ matrix.wails_tags }}"
          else
            wails build -clean
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: s2sync-${{ matrix.name }}
          path: gui/build/bin/
          if-no-files-found: error
          retention-days: 14
