name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-cli:
    name: Release CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-gui:
    name: Release GUI (${{ matrix.name }})
    needs: release-cli
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            runner: macos-latest
            wails_tags: ""
            archive_ext: zip
          - name: windows-amd64
            runner: windows-latest
            wails_tags: ""
            archive_ext: zip
          - name: linux-amd64
            runner: ubuntu-latest
            wails_tags: "webkit2_41"
            archive_ext: tar.gz
    runs-on: ${{ matrix.runner }}
    env:
      WAILS_VERSION: v2.12.0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gui/frontend/package-lock.json

      - name: Install Linux build deps
        if: matrix.name == 'linux-amd64'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Put Go bin on PATH
        shell: bash
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Build GUI
        working-directory: gui
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ matrix.wails_tags }}" ]; then
            wails build -clean -tags "${{ matrix.wails_tags }}"
          else
            wails build -clean
          fi

      - name: Package artifact (zip)
        if: matrix.archive_ext == 'zip'
        shell: bash
        working-directory: gui/build/bin
        run: |
          set -euo pipefail
          archive="s2sync_${{ matrix.name }}.zip"
          # On macOS the build output is a .app bundle directory; zip
          # recursively. On Windows it's a single .exe next to any
          # runtime files wails emits. Zipping the whole bin/ keeps
          # both cases uniform.
          if command -v zip >/dev/null 2>&1; then
            zip -r "../../../$archive" ./*
          else
            # Windows runner: use 7z (pre-installed) as zip may be absent
            7z a "../../../$archive" ./*
          fi
          ls -la "../../../$archive"

      - name: Package artifact (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        working-directory: gui/build/bin
        run: |
          set -euo pipefail
          archive="s2sync_${{ matrix.name }}.tar.gz"
          tar -czf "../../../$archive" ./*
          ls -la "../../../$archive"

      - name: Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "${GITHUB_REF_NAME}" \
            "s2sync_${{ matrix.name }}.${{ matrix.archive_ext }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
