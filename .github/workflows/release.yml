name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-cli:
    name: Release CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-gui:
    name: Release GUI (${{ matrix.name }})
    needs: release-cli
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: darwin_arm64
            runner: macos-latest
            wails_tags: ""
            archive_ext: zip
          - name: windows_amd64
            runner: windows-latest
            wails_tags: ""
            archive_ext: zip
          - name: linux_amd64
            runner: ubuntu-latest
            wails_tags: "webkit2_41"
            archive_ext: tar.gz
    runs-on: ${{ matrix.runner }}
    env:
      WAILS_VERSION: v2.12.0
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gui/frontend/package-lock.json

      - name: Install Linux build deps
        if: matrix.name == 'linux_amd64'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Put Go bin on PATH
        shell: bash
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Build GUI
        working-directory: gui
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ matrix.wails_tags }}" ]; then
            wails build -clean -tags "${{ matrix.wails_tags }}"
          else
            wails build -clean
          fi

      - name: Codesign + notarize (macOS)
        if: matrix.name == 'darwin_arm64' && env.APPLE_TEAM_ID != ''
        # First-ever submissions from a brand-new Apple Developer account
        # can sit at "In Progress" for up to a week while Apple does an
        # in-depth review (Apple DTS, 2026). Cap the wait so a stuck Notary
        # queue doesn't burn macOS runner minutes — re-run the release
        # after the first manual notarization completes and the system
        # has "learned" the app.
        timeout-minutes: 30
        working-directory: gui/build/bin
        shell: bash
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER_ID: ${{ secrets.APPLE_API_KEY_ISSUER_ID }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="$RUNNER_TEMP/sign.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          API_KEY_PATH="$RUNNER_TEMP/api_key.p8"
          APP="s2sync.app"
          ENTITLEMENTS="$GITHUB_WORKSPACE/gui/build/darwin/entitlements.plist"

          echo "$APPLE_CERT_P12_BASE64" | base64 -d > "$CERT_PATH"
          echo "$APPLE_API_KEY_P8_BASE64" | base64 -d > "$API_KEY_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | awk -F'"' '/Developer ID Application/ {print $2; exit}')
          if [ -z "$IDENTITY" ]; then
            echo "::error::No Developer ID Application identity found in keychain"
            exit 1
          fi
          echo "Signing with: $IDENTITY"

          # Sign inside-out. Apple guidance: entitlements only on the main
          # Mach-O + bundle, not on nested dylibs/helpers (--deep is the
          # opposite, doesn't apply entitlements correctly to nested code).
          find "$APP/Contents" -type f \( -perm -u+x -o -name "*.dylib" \) \
            -not -path "*/MacOS/*" -print0 \
            | xargs -0 -r -I{} codesign --force --options runtime --timestamp \
                -s "$IDENTITY" {}
          codesign --force --options runtime --timestamp \
            --entitlements "$ENTITLEMENTS" -s "$IDENTITY" \
            "$APP/Contents/MacOS/s2sync"
          codesign --force --options runtime --timestamp \
            --entitlements "$ENTITLEMENTS" -s "$IDENTITY" "$APP"

          codesign --verify --deep --strict --verbose=2 "$APP"

          # Notarize: zip the bundle, submit, wait, then staple the original.
          NOTARIZE_ZIP="$RUNNER_TEMP/notarize.zip"
          /usr/bin/ditto -c -k --keepParent "$APP" "$NOTARIZE_ZIP"
          xcrun notarytool submit "$NOTARIZE_ZIP" \
            --key "$API_KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_KEY_ISSUER_ID" \
            --wait
          xcrun stapler staple "$APP"
          xcrun stapler validate "$APP"

      - name: Package artifact (zip)
        if: matrix.archive_ext == 'zip'
        shell: bash
        working-directory: gui/build/bin
        run: |
          set -euo pipefail
          archive="s2sync_${{ matrix.name }}.zip"
          # On macOS use ditto so the stapled notarization ticket (stored
          # as an extended attribute on the .app bundle) survives the
          # zip. Plain `zip -r` strips xattrs and would break offline
          # Gatekeeper validation on the receiving end.
          if [ "${{ matrix.name }}" = "darwin_arm64" ]; then
            ditto -c -k --keepParent ./s2sync.app "../../../$archive"
          elif command -v zip >/dev/null 2>&1; then
            zip -r "../../../$archive" ./*
          else
            # Windows runner: use 7z (pre-installed) as zip may be absent
            7z a "../../../$archive" ./*
          fi
          ls -la "../../../$archive"

      - name: Package artifact (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        working-directory: gui/build/bin
        run: |
          set -euo pipefail
          archive="s2sync_${{ matrix.name }}.tar.gz"
          tar -czf "../../../$archive" ./*
          ls -la "../../../$archive"

      - name: Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "${GITHUB_REF_NAME}" \
            "s2sync_${{ matrix.name }}.${{ matrix.archive_ext }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber

  checksums:
    name: Aggregate checksums
    needs: release-gui
    runs-on: ubuntu-latest
    steps:
      - name: Download all release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p dist
          cd dist
          gh release download "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern 's2sync_*.zip' \
            --pattern 's2sync_*.tar.gz' \
            --pattern 'checksums.txt'

      - name: Append GUI checksums
        run: |
          set -euo pipefail
          cd dist
          # Compute sha256 for GUI artifacts and append to the goreleaser
          # CLI checksums.txt. Format matches `sha256sum` so users can verify
          # with `shasum -a 256 -c checksums.txt --ignore-missing`.
          sha256sum s2sync_*.zip s2sync_*.tar.gz >> checksums.txt
          echo "--- final checksums.txt ---"
          cat checksums.txt

      - name: Re-upload checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release upload "${GITHUB_REF_NAME}" \
            dist/checksums.txt \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber

  release-notes:
    name: Update release notes with downloads
    needs: checksums
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Generate Downloads section and update release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: ./scripts/release-notes.sh --update
